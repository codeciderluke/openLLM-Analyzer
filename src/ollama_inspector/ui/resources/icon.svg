<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2333"/>
      <stop offset="1" stop-color="#0c0f16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fb0ff"/>
      <stop offset="1" stop-color="#4fd6c2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#7c9cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7c9cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#tile)" stroke="#2c3346" stroke-width="2"/>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#glow)"/>

  <!-- magnifier handle -->
  <line x1="150" y1="150" x2="198" y2="198" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="198" y2="198" stroke="#0c0f16" stroke-width="6" stroke-linecap="round" opacity="0.25"/>

  <!-- lens -->
  <circle cx="106" cy="106" r="62" fill="#0e121c" fill-opacity="0.65" stroke="url(#accent)" stroke-width="11"/>

  <!-- neural model motif inside the lens -->
  <g stroke="#8fb0ff" stroke-width="4" stroke-opacity="0.55">
    <line x1="82" y1="86" x2="120" y2="106"/>
    <line x1="82" y1="126" x2="120" y2="106"/>
    <line x1="120" y1="106" x2="134" y2="82"/>
    <line x1="120" y1="106" x2="134" y2="130"/>
  </g>
  <g fill="url(#accent)">
    <circle cx="82" cy="86" r="9"/>
    <circle cx="82" cy="126" r="9"/>
    <circle cx="120" cy="106" r="10"/>
    <circle cx="134" cy="82" r="8"/>
    <circle cx="134" cy="130" r="8"/>
  </g>
</svg>
